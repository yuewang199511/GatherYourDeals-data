# Docker Compose for local development.
#
# The config.yaml from the repo root is baked into the image.
# The database is persisted in ./data/db/ on the host
# and logs are persisted in ./data/logs/ for easy inspection.
#
# First-time setup:
#   1. Copy the example env file and set your JWT secret:
#        cp .env.example .env
#        # Edit .env and set GYD_JWT_SECRET to a random string of 32+ characters
#   2. Initialise the database and create the admin account:
#        docker compose run --rm app init
#   3. Start the server:
#        docker compose up --build

services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data/db:/data
      - ./data/logs:/data/logs
      - ./config.yaml:/data/config.yaml:ro
    environment:
      - GYD_JWT_SECRET=${GYD_JWT_SECRET}
    restart: unless-stopped
